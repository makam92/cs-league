<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CS League — FACEIT ELO</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #121212;
      color: #e0e0e0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    header { text-align: center; margin-bottom: 1.5rem; }
    header h1 { font-size: 2rem; font-weight: 700; letter-spacing: 0.05em; color: #fff; }
    header p  { color: #888; margin-top: 0.4rem; font-size: 0.875rem; }
    header nav { margin-top: 1rem; display: flex; justify-content: center; gap: 0.5rem; flex-wrap: wrap; }
    header nav a {
      color: #ff6240; text-decoration: none; font-size: 0.85rem;
      border: 1px solid #ff6240; padding: 0.3rem 0.8rem; border-radius: 4px;
      transition: background 0.15s, color 0.15s;
    }
    header nav a:hover { background: #ff6240; color: #fff; }

    /* Tabs */
    .div-tabs {
      display: flex; gap: 0.4rem; flex-wrap: wrap; justify-content: center;
      max-width: 1400px; margin: 0 auto 1.5rem;
    }
    .div-tab {
      background: transparent; border: 1px solid #2a2a2a; color: #888;
      font-size: 0.8rem; padding: 0.3rem 0.8rem; border-radius: 4px;
      cursor: pointer; transition: border-color 0.15s, color 0.15s; white-space: nowrap;
    }
    .div-tab:hover { border-color: #555; color: #ccc; }
    .div-tab.active { border-color: #ff6240; color: #ff6240; font-weight: 600; }

    /* Leaderboard table (All tab) */
    .leaderboard-wrap {
      max-width: 900px;
      margin: 0 auto;
      background: #1e1e1e;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      overflow-x: auto;
    }
    .leaderboard-wrap table { width: 100%; border-collapse: collapse; }
    .leaderboard-wrap th {
      font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.08em;
      color: #555; padding: 0.55rem 0.9rem; text-align: left;
      border-bottom: 1px solid #2a2a2a; white-space: nowrap;
    }
    .leaderboard-wrap td {
      padding: 0.5rem 0.9rem; font-size: 0.875rem;
      border-bottom: 1px solid #1a1a1a; white-space: nowrap;
    }
    .leaderboard-wrap tr:last-child td { border-bottom: none; }
    .leaderboard-wrap tr:hover td { background: #252525; }

    /* Grid (division tabs) */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.5rem; max-width: 1400px; margin: 0 auto;
    }

    /* Team card */
    .team-card {
      background: #1e1e1e; border-radius: 10px;
      border: 1px solid #2a2a2a; display: flex; flex-direction: column; min-width: 0;
    }
    .team-header {
      padding: 1rem 1.2rem; background: #242424;
      border-bottom: 1px solid #2a2a2a; border-radius: 10px 10px 0 0;
      display: flex; align-items: flex-start; justify-content: space-between; gap: 0.75rem;
    }
    .team-name {
      font-size: 0.95rem; font-weight: 600; color: #fff;
    }
    .team-avg { font-size: 0.8rem; color: #888; white-space: nowrap; flex-shrink: 0; }
    .team-avg span { color: #ff6240; font-weight: 600; }

    .table-wrap { border-radius: 0 0 10px 10px; }
    .table-wrap table { width: 100%; border-collapse: collapse; }
    .table-wrap th {
      font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.08em;
      color: #555; padding: 0.5rem 0.75rem; text-align: left;
      border-bottom: 1px solid #2a2a2a; white-space: nowrap;
    }
    .table-wrap td {
      padding: 0.5rem 0.75rem; font-size: 0.875rem;
      border-bottom: 1px solid #1a1a1a;
    }
    .table-wrap .realname {
      max-width: 130px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .table-wrap tr:last-child td { border-bottom: none; }
    .table-wrap tr:hover td { background: #252525; }

    .rank-col { width: 28px; color: #444; font-size: 0.8rem; text-align: center; }

    .player-cell { display: flex; align-items: center; gap: 0.55rem; }
    .avatar { width: 28px; height: 28px; border-radius: 50%; object-fit: cover; background: #333; flex-shrink: 0; }
    .avatar-placeholder {
      width: 28px; height: 28px; border-radius: 50%; background: #2e2e2e;
      flex-shrink: 0; display: flex; align-items: center; justify-content: center;
      font-size: 0.7rem; color: #555; font-weight: 700;
    }
    .nick     { font-weight: 600; color: #fff; }
    .realname { font-size: 0.72rem; color: #666; }

    .elo-cell { text-align: right; font-weight: 700; font-size: 0.9rem; }
    .elo-none { color: #444; }

    .level-badge {
      display: inline-flex; align-items: center; justify-content: center;
      width: 22px; height: 22px; border-radius: 4px;
      font-size: 0.7rem; font-weight: 800; color: #fff;
      text-shadow: 0 1px 2px rgba(0,0,0,0.5);
    }
    .lvl-1  { background: #828282; }
    .lvl-2  { background: #828282; }
    .lvl-3  { background: #1ce400; color: #000; text-shadow: none; }
    .lvl-4  { background: #1ce400; color: #000; text-shadow: none; }
    .lvl-5  { background: #f5e942; color: #000; text-shadow: none; }
    .lvl-6  { background: #f5a623; color: #000; text-shadow: none; }
    .lvl-7  { background: #f5a623; color: #000; text-shadow: none; }
    .lvl-8  { background: #f0582a; }
    .lvl-9  { background: #f0582a; }
    .lvl-10 { background: #e60039; }
    .lvl-none { background: #2a2a2a; color: #444; }

    /* Expandable Leetify detail row */
    .player-detail-row td { padding: 0; border-bottom: 1px solid #2a2a2a; }
    .player-detail-inner {
      display: none;
      padding: 0.75rem 1rem;
      background: #181818;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      flex-wrap: wrap;
    }
    .player-detail-row.open .player-detail-inner { display: flex; }
    .player-row-clickable { cursor: pointer; }
    .player-row-clickable.open td { background: #222 !important; }

    .leetify-stat {
      background: #1e1e1e;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 0.6rem 1rem;
      display: flex; flex-direction: column; align-items: center; gap: 0.3rem;
      min-width: 80px;
    }
    .leetify-stat-label { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.08em; color: #555; }
    .leetify-stat-value { font-size: 1.2rem; font-weight: 700; }
    .leetify-bar { width: 100%; height: 3px; background: #2a2a2a; border-radius: 2px; }
    .leetify-bar-fill { height: 100%; border-radius: 2px; background: #ff6240; }
    .leetify-link {
      color: #ff6240; font-size: 0.78rem; text-decoration: none;
      border: 1px solid #ff6240; padding: 0.25rem 0.7rem; border-radius: 4px;
      white-space: nowrap;
    }
    .leetify-link:hover { background: #ff6240; color: #fff; }
    .leetify-no-data { color: #444; font-size: 0.8rem; }

    @media (max-width: 480px) {
      body { padding: 1rem 0.5rem; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <h1>CS League — FACEIT ELO</h1>
    <p>Season 8 · team rankings by average ELO</p>
    <nav>
      <a href="standings.html">Standings</a>
      <a href="stats.html">Player Stats</a>
      <a href="match-history.html">Match History</a>
    </nav>
  </header>

  <div class="div-tabs" id="div-tabs"></div>
  <div id="content"><p style="text-align:center;color:#555;padding:2rem">Loading...</p></div>

  <script>
    const S8_DIVISION_TEAMS = {
      "Division 1":  ["CGI Sverige AB","Bredband2 AB","Toyota Material Handling AB","Telia Sverige AB","Netlight AB DUENDE","Northmill Bank AB","Webhallen Sverige AB"],
      "Division 2A": ["Sciber AB","Spiris AB","Fortnox AB","EA DICE AB","Telia AB Jönköping","Netlight AB BOIDS","Boulder AB Hong Kong","XXL Sport och Vildmark AB"],
      "Division 2B": ["Fragbite AB","HappyHomes Lidingö AB","Öhrlings PricewaterhouseCoopers AB","Uniguide AB","Lumera AB 2","Aderian Aktiv IT AB","Xenit AB","Svea Bank AB"],
      "Division 2C": ["Boulder AB Mozarteum","Dizparc Infrastruktur Jönköping AB","Eltel Networks AB","Onevinn AB","SSG Solutions AB","DynaMate AB","Omegapoint AB","Asurgent AB"],
      "Division 2D": ["Accenture AB","Nordlo Evolve AB","evolvit Solutions AB","PARA Esports AB","Silverspin AB","NoA Ignite AB","Horda Stans AB","Teamtailor AB"],
      "Division 2E": ["Lumera AB 1","Nordomatic AB","Teris AB","Viström Digital Development AB","SOLTAK AB","Boulder AB Golden","Monitor ERP System AB","Enzure AB"],
      "Division 2F": ["Etraveli Group AB","CGI AB Optimistic Reloaders","Hello Ebbot AB","Netgain AB","SAVR AB","Hogia AB","Sweco AB","Leadstar Media AB"],
      "Division 2G": ["Softronic CM1 AB","Knuts Bygg AB","Andwhy AB","Gjuteriteknik AB","Infracom AB","Mpya Digital AB","Bizzdo AB","NODAF AB"],
    };

    const TEAM_TO_DIV = {};
    for (const [div, teams] of Object.entries(S8_DIVISION_TEAMS))
      teams.forEach(t => TEAM_TO_DIV[t] = div);

    let allData = {};
    let leetifyData = {};
    let activeTab = "All";

    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function levelClass(lvl) { return lvl ? `lvl-${lvl}` : 'lvl-none'; }
    function eloColor(elo) {
      if (!elo) return '#444';
      if (elo >= 2000) return '#e60039';
      if (elo >= 1700) return '#f0582a';
      if (elo >= 1400) return '#f5a623';
      if (elo >= 1250) return '#f5e942';
      if (elo >= 950)  return '#1ce400';
      return '#828282';
    }
    function avgElo(players) {
      const known = players.filter(p => p.elo);
      if (!known.length) return null;
      return Math.round(known.reduce((s, p) => s + p.elo, 0) / known.length);
    }
    function avatarEl(p) {
      const initial = (p.nickname || p.name || '?')[0].toUpperCase();
      return p.avatar
        ? `<img class="avatar" src="${esc(p.avatar)}" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="avatar-placeholder" style="display:none">${initial}</div>`
        : `<div class="avatar-placeholder">${initial}</div>`;
    }

    function leetifyStat(label, value) {
      const cls = value >= 70 ? 'val-hi' : value >= 40 ? '' : 'val-lo';
      const color = value >= 70 ? '#4caf50' : value >= 40 ? '#e0e0e0' : '#f44336';
      const fill = Math.min(100, Math.max(0, value));
      return `<div class="leetify-stat">
        <div class="leetify-stat-label">${label}</div>
        <div class="leetify-stat-value" style="color:${color}">${value}</div>
        <div class="leetify-bar"><div class="leetify-bar-fill" style="width:${fill}%"></div></div>
      </div>`;
    }
    function leetifyClutch(label, value) {
      const pct = Math.round(value * 100);
      const color = pct >= 15 ? '#4caf50' : pct >= 8 ? '#e0e0e0' : '#f44336';
      const fill = Math.min(100, pct * 3);
      return `<div class="leetify-stat">
        <div class="leetify-stat-label">${label}</div>
        <div class="leetify-stat-value" style="color:${color}">${pct}%</div>
        <div class="leetify-bar"><div class="leetify-bar-fill" style="width:${fill}%"></div></div>
      </div>`;
    }
    function profileLinks(p) {
      const faceitNick = p.nickname || '';
      return `
        <a class="leetify-link" href="https://leetify.com/app/profile/${p.steamid}" target="_blank" rel="noopener">Leetify ↗</a>
        ${faceitNick ? `<a class="leetify-link" href="https://www.faceit.com/en/players/${encodeURIComponent(faceitNick)}" target="_blank" rel="noopener">FACEIT ↗</a>` : ''}
      `;
    }
    function detailRowHtml(rowId, p, colspan) {
      const l = leetifyData[p.steamid];
      const inner = l ? `
        ${leetifyStat("Aim", l.aim)}
        ${leetifyStat("Utility", l.utility)}
        ${leetifyStat("Positioning", l.positioning)}
        ${leetifyClutch("Clutch", l.clutch)}
        ${profileLinks(p)}
      ` : `<span class="leetify-no-data">No Leetify data</span>${profileLinks(p)}`;
      return `<tr class="player-detail-row" id="${rowId}"><td colspan="${colspan}"><div class="player-detail-inner">${inner}</div></td></tr>`;
    }
    function toggleDetail(rowId) {
      const detailRow = document.getElementById(rowId);
      if (!detailRow) return;
      const playerRow = detailRow.previousElementSibling;
      const isOpen = detailRow.classList.contains('open');
      detailRow.classList.toggle('open', !isOpen);
      if (playerRow) playerRow.classList.toggle('open', !isOpen);
    }

    function renderAll() {
      // Flatten all players from all teams, sorted by ELO desc
      const players = [];
      for (const [team, list] of Object.entries(allData)) {
        for (const p of list) players.push({ ...p, team });
      }
      players.sort((a, b) => (b.elo || 0) - (a.elo || 0));

      const rows = players.map((p, i) => {
        const displayNick = p.nickname || p.name || '?';
        const eloStr = p.elo ? `<span style="color:${eloColor(p.elo)};font-weight:700">${p.elo}</span>` : `<span class="elo-none">—</span>`;
        const lvlStr = `<span class="level-badge ${levelClass(p.level)}">${p.level || '—'}</span>`;
        const div = (TEAM_TO_DIV[p.team] || '—').replace('Division ', '');
        const rowId = `lbd-${p.steamid}`;
        return `<tr class="player-row-clickable" onclick="toggleDetail('${rowId}')">
          <td class="rank-col">${p.elo ? i + 1 : ''}</td>
          <td><div class="player-cell">${avatarEl(p)}<div><div class="nick">${esc(displayNick)}</div><div class="realname">${esc(p.name)}</div></div></div></td>
          <td style="color:#666;font-size:0.8rem">${esc(p.team)}</td>
          <td style="color:#555;font-size:0.78rem">${esc(div)}</td>
          <td style="text-align:center">${lvlStr}</td>
          <td class="elo-cell">${eloStr}</td>
        </tr>${detailRowHtml(rowId, p, 6)}`;
      }).join('');

      document.getElementById('content').innerHTML = `
        <div class="leaderboard-wrap">
          <table>
            <thead><tr>
              <th class="rank-col">#</th>
              <th>Player</th>
              <th>Team</th>
              <th>Division</th>
              <th style="text-align:center">Lvl</th>
              <th style="text-align:right">ELO</th>
            </tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>`;
    }

    function renderTeam(name, players, rank) {
      const sorted = [...players].sort((a, b) => (b.elo || 0) - (a.elo || 0));
      const avg = avgElo(players);
      const rows = sorted.map((p, i) => {
        const displayNick = p.nickname || p.name || '?';
        const eloStr = p.elo ? `<span style="color:${eloColor(p.elo)}">${p.elo}</span>` : `<span class="elo-none">—</span>`;
        const lvlStr = `<span class="level-badge ${levelClass(p.level)}">${p.level || '—'}</span>`;
        const rowId = `div-${p.steamid}`;
        return `<tr class="player-row-clickable" onclick="toggleDetail('${rowId}')">
          <td class="rank-col">${p.elo ? i + 1 : ''}</td>
          <td><div class="player-cell">${avatarEl(p)}<div><div class="nick">${esc(displayNick)}</div><div class="realname">${esc(p.name)}</div></div></div></td>
          <td style="text-align:center">${lvlStr}</td>
          <td class="elo-cell">${eloStr}</td>
        </tr>${detailRowHtml(rowId, p, 4)}`;
      }).join('');

      return `
        <div class="team-card">
          <div class="team-header">
            <div>
              <div style="font-size:0.7rem;color:#555;margin-bottom:0.2rem">#${rank}</div>
              <div class="team-name">${esc(name)}</div>
            </div>
            <div class="team-avg">${avg ? `Avg ELO <span>${avg}</span>` : 'ELO unavailable'}</div>
          </div>
          <div class="table-wrap">
            <table>
              <thead><tr>
                <th class="rank-col">#</th><th>Player</th>
                <th style="text-align:center">Lvl</th><th style="text-align:right">ELO</th>
              </tr></thead>
              <tbody>${rows}</tbody>
            </table>
          </div>
        </div>`;
    }

    function renderDivision(divName) {
      const teamNames = S8_DIVISION_TEAMS[divName] || [];
      const teams = teamNames.filter(n => allData[n]).map(n => [n, allData[n]]);
      teams.sort((a, b) => (avgElo(b[1]) || 0) - (avgElo(a[1]) || 0));
      if (!teams.length) {
        document.getElementById('content').innerHTML = '<p style="text-align:center;color:#555;padding:2rem">No ELO data for this division yet.</p>';
        return;
      }
      document.getElementById('content').innerHTML = `<div class="grid">${teams.map(([name, players], i) => renderTeam(name, players, i + 1)).join('')}</div>`;
    }

    function setTab(tab) {
      activeTab = tab;
      document.querySelectorAll('.div-tab').forEach(btn =>
        btn.classList.toggle('active', btn.dataset.tab === tab));
      if (tab === 'All') renderAll();
      else renderDivision(tab);
    }

    // Build tabs
    const tabsEl = document.getElementById('div-tabs');
    [['All', 'All'], ...Object.keys(S8_DIVISION_TEAMS).map(d => [d, d])].forEach(([tab, label]) => {
      const btn = document.createElement('button');
      btn.className = 'div-tab';
      btn.dataset.tab = tab;
      btn.textContent = label;
      btn.onclick = () => setTab(tab);
      tabsEl.appendChild(btn);
    });

    // Load data
    Promise.all([
      fetch('data/s8/elo_teams.json').then(r => r.ok ? r.json() : Promise.reject()),
      fetch('data/s8/leetify.json').then(r => r.ok ? r.json() : {}).catch(() => ({})),
    ]).then(([eloData, lData]) => {
      allData = eloData;
      leetifyData = lData;
      setTab('All');
    }).catch(() => {
      document.getElementById('content').innerHTML = '<p style="text-align:center;color:#555;padding:2rem">Failed to load ELO data.</p>';
    });
  </script>
<script data-goatcounter="https://makam.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>
</body>
</html>
